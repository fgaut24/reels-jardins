<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--cream:#FFF4E4;--peach:#FFE2BE;--ink:#2E1F16;--muted:#6A5240;--coral:#EE4A26;--gold:#FBA819;--teal:#0E9E84;--tealtx:#0B7A66;--accent:#EE4A26;--discink:#FFF;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Archivo',sans-serif;}
html,body{margin:0;background:#fff;overflow:hidden;}
.poster{position:relative;width:1080px;height:1920px;container-type:size;overflow:hidden;display:flex;flex-direction:column;color:var(--ink);background:radial-gradient(120% 60% at 85% 0%,#FFFBF2 0%,var(--cream) 45%,var(--peach) 100%);}
.ring{position:absolute;border-radius:50%;z-index:1;opacity:0;pointer-events:none;}
.r1{width:34cqw;height:34cqw;top:-15cqw;right:-12cqw;border:3cqw solid var(--coral);}
.r2{width:22cqw;height:22cqw;top:-8cqw;right:-5cqw;border:2.2cqw solid var(--gold);}
.r3{width:12cqw;height:12cqw;top:-2cqw;right:1cqw;border:1.6cqw solid var(--teal);}
.spk{position:absolute;z-index:1;opacity:0;}
.wrap{position:relative;z-index:3;flex:1;display:flex;flex-direction:column;padding:6.5cqw 6.5cqw 3cqw;min-height:0;}
.eyebrow{align-self:flex-start;font-weight:800;letter-spacing:.1em;text-transform:uppercase;font-size:2.5cqw;white-space:nowrap;color:#fff;background:var(--coral);padding:1.1cqw 2.8cqw;border-radius:999px;transform:rotate(-2deg);opacity:0;}
.title{font-weight:900;text-transform:uppercase;font-size:7cqw;line-height:.92;letter-spacing:-.02em;margin-top:3cqw;}
.t1{display:inline-block;opacity:0;}
.hl{display:inline-block;background:var(--coral);color:#fff;padding:.2cqw 1.6cqw .6cqw;border-radius:1.3cqw;white-space:nowrap;transform:rotate(-1.5deg) scale(.7);margin-top:1cqw;opacity:0;}
.sub{margin-top:2.6cqw;font-weight:900;text-transform:uppercase;letter-spacing:.03em;font-size:2.5cqw;color:var(--tealtx);opacity:0;}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3cqw;min-height:0;text-align:center;}
.discwrap{opacity:0;}
.bigdisc{width:34cqw;height:34cqw;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--discink);background:var(--accent);transform:rotate(-4deg);box-shadow:0 1.5cqw 4cqw rgba(46,31,22,.18);}
.bigdisc .d{font-weight:900;font-size:16cqw;line-height:.85;}
.bigdisc .m{font-weight:800;font-size:3.4cqw;letter-spacing:.12em;text-transform:uppercase;margin-top:1cqw;}
.a1,.a2{font-weight:900;font-size:6.2cqw;line-height:1.02;letter-spacing:-.01em;opacity:0;}
.gen{font-weight:700;font-size:3cqw;color:var(--muted);opacity:0;}
.footband{position:relative;z-index:3;background:var(--teal);color:#fff;padding:3.4cqw 6.5cqw 3.8cqw;opacity:0;}
.tarifs{font-weight:700;font-size:2.5cqw;}.tarifs b{font-weight:900;}
.cta-row{display:flex;align-items:center;gap:3cqw;margin-top:2.5cqw;}
.cta-block{display:flex;flex-direction:column;align-items:flex-start;gap:.7cqw;}
.cta{background:var(--coral);color:#fff;font-weight:900;font-size:3.4cqw;padding:1.8cqw 3.8cqw;border-radius:999px;white-space:nowrap;transform:scale(.85);opacity:0;}
.resv{font-weight:900;text-transform:uppercase;letter-spacing:.05em;font-size:2.5cqw;}
.mail{font-weight:700;font-size:1.9cqw;opacity:.93;}
.logo{margin-left:auto;height:8cqw;width:auto;}
@keyframes fadeIn{to{opacity:1;}}
@keyframes slideL{from{opacity:0;transform:translateX(-40px);}to{opacity:1;transform:translateX(0);}}
@keyframes hlPop{0%{opacity:0;transform:rotate(-1.5deg) scale(.7);}70%{opacity:1;transform:rotate(-1.5deg) scale(1.07);}100%{opacity:1;transform:rotate(-1.5deg) scale(1);}}
@keyframes discPop{0%{opacity:0;transform:scale(.5);}70%{opacity:1;transform:scale(1.08);}100%{opacity:1;transform:scale(1);}}
@keyframes upIn{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes footRise{from{opacity:0;transform:translateY(48px);}to{opacity:1;transform:translateY(0);}}
@keyframes ctaPop{0%{opacity:0;transform:scale(.8);}70%{opacity:1;transform:scale(1.05);}100%{opacity:1;transform:scale(1);}}
@keyframes ringIn{from{opacity:0;transform:scale(.6);}to{opacity:.9;transform:scale(1);}}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1.12);}}
.play .r1{animation:ringIn .8s .1s ease-out both;}
.play .r2{animation:ringIn .8s .25s ease-out both;}
.play .r3{animation:ringIn .8s .4s ease-out both;}
.play .eyebrow{animation:fadeIn .6s .3s ease-out both;}
.play .t1{animation:slideL .7s .6s cubic-bezier(.2,.8,.2,1) both;}
.play .hl{animation:hlPop .7s 1.0s cubic-bezier(.2,.8,.2,1) both;}
.play .sub{animation:fadeIn .7s 1.45s ease-out both;}
.play .discwrap{animation:discPop .7s 2.0s cubic-bezier(.2,.8,.2,1) both;}
.play .a1{animation:upIn .55s 2.6s cubic-bezier(.2,.8,.2,1) both;}
.play .a2{animation:upIn .55s 2.95s cubic-bezier(.2,.8,.2,1) both;}
.play .gen{animation:fadeIn .6s 3.35s ease-out both;}
.play .footband{animation:footRise .8s 3.9s cubic-bezier(.2,.8,.2,1) both;}
.play .cta{animation:ctaPop .6s 4.5s cubic-bezier(.2,.8,.2,1) both;}
.play .spk{animation:twinkle 2.4s 5s ease-in-out infinite;}
</style></head><body>

<script>
window.FIELDS=["eyebrow","t1","hl","sub","day","mo","a1","a2","gen","tarifs","cta","resv","mail"];
